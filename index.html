<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
  }

  .app {
    border-radius: 16px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #FFF0F5 0%, #FFD6E8 40%, #E8C8FF 70%, #FFD6E8 100%);
  }

  /* 타이틀바 (드래그 영역) */
  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    font-size: 12px;
    color: #C71585;
    font-weight: 700;
  }
  .titlebar-btns {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 6px;
  }
  .titlebar-btns button {
    background: rgba(255,105,180,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    color: #C71585;
  }
  .titlebar-btns button:hover { background: rgba(255,105,180,0.3); }

  /* 단축키 안내 */
  .shortcuts {
    text-align: center;
    font-size: 9px;
    color: #D4458E;
    opacity: 0.7;
    padding: 0 8px 4px;
  }

  /* 카운터 리스트 */
  .counters {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* 글라스 카드 */
  .card {
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.5);
    padding: 10px 14px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 24px;
    background: rgba(255,255,255,0.2);
    border-radius: 14px 14px 0 0;
    pointer-events: none;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 13px;
    font-weight: 700;
    background: none;
    border: none;
    outline: none;
    width: 100%;
    padding: 2px;
  }
  .card-menu {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
  }

  /* 숫자 — 클릭하면 편집 */
  .card-number {
    text-align: center;
    font-size: 36px;
    font-weight: 800;
    margin: 4px 0;
    cursor: pointer;
    letter-spacing: -1px;
    transition: transform 0.1s;
  }
  .card-number:hover { opacity: 0.8; }
  .card-number-input {
    text-align: center;
    font-size: 36px;
    font-weight: 800;
    margin: 4px 0;
    border: 2px dashed rgba(255,255,255,0.5);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    outline: none;
    width: 100%;
    padding: 0;
    letter-spacing: -1px;
  }

  .card-buttons {
    display: flex;
    justify-content: center;
    gap: 16px;
  }
  .card-btn {
    width: 48px;
    height: 34px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.4);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .card-btn:hover { transform: scale(1.08); }
  .card-btn:active { transform: scale(0.92); }

  /* 추가 버튼 */
  .add-btn {
    margin: 6px auto 10px;
    width: 44px;
    height: 44px;
    border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(255,105,180,0.15);
    backdrop-filter: blur(10px);
    font-size: 24px;
    color: #C71585;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-btn:hover { background: rgba(255,105,180,0.3); }

  /* 색상 피커 */
  .color-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 6px 0;
  }
  .color-dot {
    width: 20px;
    height: 20px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: #fff; }

  /* 근무시간 바 */
  .workbar {
    margin: 0 12px 2px;
    position: relative;
    cursor: pointer;
  }
  .workbar-track {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.35);
    overflow: hidden;
    position: relative;
  }
  .workbar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #FF69B4, #D4A5FF);
    transition: width 1s linear;
  }
  .workbar-now {
    position: absolute;
    top: -1px;
    width: 3px;
    height: 8px;
    background: #C71585;
    border-radius: 1.5px;
    transition: left 1s linear;
  }
  .workbar-tooltip {
    text-align: center;
    font-size: 8px;
    color: #D4458E;
    opacity: 0.6;
    margin-top: 1px;
  }
  .workbar-settings {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
    font-size: 10px;
    color: #D4458E;
  }
  .workbar-settings input {
    width: 55px;
    text-align: center;
    border: 1.5px solid rgba(255,105,180,0.3);
    border-radius: 6px;
    padding: 2px 4px;
    font-size: 10px;
    background: rgba(255,255,255,0.2);
    color: #C71585;
    outline: none;
  }

  /* 뽀모도로 */
  .pomo {
    margin: 4px 10px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.5);
    padding: 8px 14px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .pomo::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 14px 14px 0 0;
    pointer-events: none;
  }
  .pomo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .pomo-label {
    font-size: 11px;
    font-weight: 700;
  }
  .pomo-phase {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 8px;
  }
  .pomo-time {
    text-align: center;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 2px;
    margin: 2px 0;
  }
  .pomo-bar {
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    margin: 6px 0;
    overflow: hidden;
  }
  .pomo-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s linear;
  }
  .pomo-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .pomo-btn {
    padding: 4px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.4);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .pomo-btn:hover { transform: scale(1.05); }
  .pomo-btn:active { transform: scale(0.95); }
  .pomo-sessions {
    text-align: center;
    font-size: 9px;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* 펄스 애니메이션 */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .pulse { animation: pulse 0.2s ease-out; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <span>♡ 핑크 계수기</span>
    <div class="titlebar-btns">
      <button onclick="minimizeWin()">─</button>
      <button onclick="closeWin()">✕</button>
    </div>
  </div>
  <div class="shortcuts">Ctrl+1 총+실 | Ctrl+2 총 | Ctrl+3 실-1</div>
  <div id="workbar"></div>
  <div id="pomodoro"></div>
  <div class="counters" id="counters"></div>
  <button class="add-btn" onclick="addCounter()">＋</button>
</div>

<script>
const { ipcRenderer } = require('electron');

const COLORS = {
  rose:     { main: '#FF69B4', light: '#FFB6D9', dark: '#D4458E' },
  coral:    { main: '#FF7F8E', light: '#FFBCC3', dark: '#D4606C' },
  peach:    { main: '#FFAAA5', light: '#FFD5D2', dark: '#D48580' },
  lavender: { main: '#D4A5FF', light: '#EADAFF', dark: '#A87AD4' },
  baby:     { main: '#FFB6D9', light: '#FFDDED', dark: '#D490B0' },
  magenta:  { main: '#E040A0', light: '#F0A0D0', dark: '#B03080' },
};
const COLOR_KEYS = Object.keys(COLORS);

let counters = [];
let nextId = 1;

function load() {
  try {
    const raw = localStorage.getItem('pink_counters');
    if (raw) {
      counters = JSON.parse(raw);
      nextId = Math.max(...counters.map(c => parseInt(c.id) || 0)) + 1;
    }
  } catch {}
  if (counters.length === 0) {
    counters = [
      { id: '1', name: '총건수', value: 0, colorKey: 'rose' },
      { id: '2', name: '실건수', value: 0, colorKey: 'coral' },
    ];
    nextId = 3;
  }
}

function save() {
  localStorage.setItem('pink_counters', JSON.stringify(counters));
}

function findByName(name) {
  return counters.find(c => c.name === name);
}

function render() {
  const el = document.getElementById('counters');
  el.innerHTML = counters.map((c, i) => {
    const col = COLORS[c.colorKey] || COLORS.rose;
    return `
      <div class="card" style="background:${col.main}12; border-color:${col.main}40;">
        <div class="card-header">
          <input class="card-name" style="color:${col.dark}" value="${esc(c.name)}"
            onchange="renameCtr('${c.id}', this.value)" maxlength="20">
          <button class="card-menu" style="color:${col.dark}" onclick="toggleColors('${c.id}')">⋯</button>
        </div>
        <div id="colors-${c.id}" style="display:none">
          <div class="color-picker">
            ${COLOR_KEYS.map(k => `<div class="color-dot ${k===c.colorKey?'active':''}"
              style="background:${COLORS[k].main}" onclick="setColor('${c.id}','${k}')"></div>`).join('')}
          </div>
        </div>
        <div class="card-number" id="num-${c.id}" style="color:${col.dark}"
          onclick="startEdit('${c.id}')">${c.value}</div>
        <div class="card-buttons">
          <button class="card-btn" style="background:${col.main}25;border-color:rgba(255,255,255,0.4);color:${col.dark}"
            onclick="decr('${c.id}')">−</button>
          <button class="card-btn" style="background:${col.main}35;border-color:rgba(255,255,255,0.5);color:${col.dark}"
            onclick="incr('${c.id}')">＋</button>
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function incr(id) {
  const c = counters.find(x => x.id === id);
  if (c) { c.value++; save(); render(); pulseNum(id); }
}

function decr(id) {
  const c = counters.find(x => x.id === id);
  if (c && c.value > 0) { c.value--; save(); render(); pulseNum(id); }
}

function renameCtr(id, name) {
  const c = counters.find(x => x.id === id);
  if (c) { c.name = name; save(); }
}

function setColor(id, colorKey) {
  const c = counters.find(x => x.id === id);
  if (c) { c.colorKey = colorKey; save(); render(); }
}

function toggleColors(id) {
  const el = document.getElementById('colors-' + id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function startEdit(id) {
  const c = counters.find(x => x.id === id);
  if (!c) return;
  const col = COLORS[c.colorKey] || COLORS.rose;
  const el = document.getElementById('num-' + id);
  el.outerHTML = `<input class="card-number-input" id="edit-${id}" style="color:${col.dark}"
    type="number" value="${c.value}" onblur="finishEdit('${id}')"
    onkeydown="if(event.key==='Enter')this.blur()">`;
  const input = document.getElementById('edit-' + id);
  input.focus();
  input.select();
}

function finishEdit(id) {
  const input = document.getElementById('edit-' + id);
  if (!input) return;
  const c = counters.find(x => x.id === id);
  if (c) {
    const val = parseInt(input.value);
    c.value = isNaN(val) ? 0 : Math.max(0, val);
    save();
  }
  render();
}

function addCounter() {
  const colorKey = COLOR_KEYS[counters.length % COLOR_KEYS.length];
  counters.push({ id: String(nextId++), name: '카운터 ' + counters.length, value: 0, colorKey });
  save();
  render();
}

function pulseNum(id) {
  const el = document.getElementById('num-' + id);
  if (el) { el.classList.add('pulse'); setTimeout(() => el.classList.remove('pulse'), 200); }
}

// 글로벌 단축키 수신 (다른 앱에서도 동작)
ipcRenderer.on('shortcut', (e, type) => {
  if (type === 'both-up') {
    const t = findByName('총건수');
    const r = findByName('실건수');
    if (t) t.value++;
    if (r) r.value++;
    save(); render();
    if (t) pulseNum(t.id);
    if (r) pulseNum(r.id);
  } else if (type === 'total-up') {
    const t = findByName('총건수');
    if (t) { t.value++; save(); render(); pulseNum(t.id); }
  } else if (type === 'real-down') {
    const r = findByName('실건수');
    if (r && r.value > 0) { r.value--; save(); render(); pulseNum(r.id); }
  }
});

// 앱 내 키보드 단축키 (포커스 있을 때)
let keyBuffer = '';
let keyTimer = null;
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  const codeMap = { KeyD: 'D', KeyF: 'F', KeyQ: 'Q', KeyW: 'W', KeyA: 'A' };
  const mapped = codeMap[e.code];
  if (!mapped) { keyBuffer = ''; return; }

  clearTimeout(keyTimer);
  keyTimer = setTimeout(() => keyBuffer = '', 800);
  keyBuffer += mapped;
  if (keyBuffer.length > 4) keyBuffer = keyBuffer.slice(-4);

  if (keyBuffer.endsWith('DF')) {
    const t = findByName('총건수'), r = findByName('실건수');
    if (t) t.value++;
    if (r) r.value++;
    save(); render(); keyBuffer = '';
  } else if (keyBuffer.endsWith('QWAQ')) {
    const r = findByName('실건수');
    if (r && r.value > 0) { r.value--; save(); render(); }
    keyBuffer = '';
  }
});

// 윈도우 컨트롤
function closeWin() { ipcRenderer.send('window-close'); }
function minimizeWin() { ipcRenderer.send('window-minimize'); }

// ─── 근무시간 바 ───
let workConfig = { start: '09:00', end: '18:00' };
let showWorkSettings = false;

function workLoad() {
  try {
    const raw = localStorage.getItem('pink_work');
    if (raw) workConfig = JSON.parse(raw);
  } catch {}
}

function workSave() {
  localStorage.setItem('pink_work', JSON.stringify(workConfig));
}

function workToMin(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function workRender() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const startMin = workToMin(workConfig.start);
  const endMin = workToMin(workConfig.end);
  const totalMin = endMin - startMin;

  let elapsed = nowMin - startMin;
  let remaining = endMin - nowMin;
  let pct = 0;

  let status = '';
  if (nowMin < startMin) {
    elapsed = 0; remaining = totalMin; pct = 0;
    status = '출근 전';
  } else if (nowMin >= endMin) {
    elapsed = totalMin; remaining = 0; pct = 100;
    status = '퇴근!';
  } else {
    pct = (elapsed / totalMin * 100);
    const rh = Math.floor(remaining / 60);
    const rm = remaining % 60;
    status = `${rh}시간 ${rm}분 남음`;
  }

  const settingsHtml = showWorkSettings ? `
    <div class="workbar-settings">
      <input type="time" value="${workConfig.start}" onclick="event.stopPropagation()" onchange="workSetStart(this.value)">
      <span>~</span>
      <input type="time" value="${workConfig.end}" onclick="event.stopPropagation()" onchange="workSetEnd(this.value)">
    </div>
  ` : '';

  document.getElementById('workbar').innerHTML = `
    <div class="workbar" onclick="workToggleSettings()">
      <div class="workbar-track">
        <div class="workbar-fill" style="width:${pct.toFixed(1)}%"></div>
        <div class="workbar-now" style="left:${Math.min(Math.max(pct, 0), 98).toFixed(1)}%"></div>
      </div>
      <div class="workbar-tooltip">${status}</div>
    </div>
    ${settingsHtml}
  `;
}

function workToggleSettings() {
  showWorkSettings = !showWorkSettings;
  workRender();
}

function workSetStart(val) {
  workConfig.start = val;
  workSave();
  workRender();
}

function workSetEnd(val) {
  workConfig.end = val;
  workSave();
  workRender();
}

// 1분마다 근무바 업데이트
setInterval(workRender, 60000);

// ─── 뽀모도로 타이머 ───
const POMO = {
  work: 25 * 60,
  shortBreak: 5 * 60,
  longBreak: 15 * 60,
};

let pomoState = {
  phase: 'work',      // work | break
  remaining: POMO.work,
  total: POMO.work,
  running: false,
  sessions: 0,
  interval: null,
};

function pomoLoad() {
  try {
    const raw = localStorage.getItem('pink_pomo');
    if (raw) {
      const saved = JSON.parse(raw);
      pomoState.sessions = saved.sessions || 0;
    }
  } catch {}
}

function pomoSave() {
  localStorage.setItem('pink_pomo', JSON.stringify({ sessions: pomoState.sessions }));
}

function pomoFormat(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function pomoRender() {
  const isWork = pomoState.phase === 'work';
  const col = isWork ? { bg: '#FF69B412', border: '#FF69B440', dark: '#D4458E', main: '#FF69B4' }
                     : { bg: '#D4A5FF12', border: '#D4A5FF40', dark: '#A87AD4', main: '#D4A5FF' };
  const pct = ((pomoState.total - pomoState.remaining) / pomoState.total * 100).toFixed(1);

  document.getElementById('pomodoro').innerHTML = `
    <div class="pomo" style="background:${col.bg}; border-color:${col.border};">
      <div class="pomo-header">
        <span class="pomo-label" style="color:${col.dark}">🍅 뽀모도로</span>
        <span class="pomo-phase" style="background:${col.main}30; color:${col.dark}">
          ${isWork ? '집중' : '휴식'}
        </span>
      </div>
      <div class="pomo-time" style="color:${col.dark}">${pomoFormat(pomoState.remaining)}</div>
      <div class="pomo-bar">
        <div class="pomo-bar-fill" style="width:${pct}%; background:${col.main}"></div>
      </div>
      <div class="pomo-buttons">
        <button class="pomo-btn" style="background:${col.main}30; color:${col.dark}"
          onclick="pomoToggle()">${pomoState.running ? '일시정지' : '시작'}</button>
        <button class="pomo-btn" style="background:${col.main}15; color:${col.dark}"
          onclick="pomoReset()">리셋</button>
        <button class="pomo-btn" style="background:${col.main}15; color:${col.dark}"
          onclick="pomoSkip()">건너뛰기</button>
      </div>
      <div class="pomo-sessions" style="color:${col.dark}">완료 세션: ${pomoState.sessions}회</div>
    </div>
  `;
}

function pomoToggle() {
  if (pomoState.running) {
    clearInterval(pomoState.interval);
    pomoState.running = false;
  } else {
    pomoState.running = true;
    pomoState.interval = setInterval(pomoTick, 1000);
  }
  pomoRender();
}

function pomoTick() {
  if (pomoState.remaining <= 0) {
    clearInterval(pomoState.interval);
    pomoState.running = false;

    // 알림
    if (pomoState.phase === 'work') {
      pomoState.sessions++;
      pomoSave();
      new Notification('🍅 집중 끝!', { body: `${pomoState.sessions}번째 세션 완료. 휴식하세요!` });
      pomoState.phase = 'break';
      pomoState.remaining = pomoState.sessions % 4 === 0 ? POMO.longBreak : POMO.shortBreak;
      pomoState.total = pomoState.remaining;
    } else {
      new Notification('☕ 휴식 끝!', { body: '다시 집중할 시간!' });
      pomoState.phase = 'work';
      pomoState.remaining = POMO.work;
      pomoState.total = POMO.work;
    }
    pomoRender();
    return;
  }
  pomoState.remaining--;
  pomoRender();
}

function pomoReset() {
  clearInterval(pomoState.interval);
  pomoState.running = false;
  pomoState.phase = 'work';
  pomoState.remaining = POMO.work;
  pomoState.total = POMO.work;
  pomoRender();
}

function pomoSkip() {
  clearInterval(pomoState.interval);
  pomoState.running = false;
  if (pomoState.phase === 'work') {
    pomoState.sessions++;
    pomoSave();
    pomoState.phase = 'break';
    pomoState.remaining = pomoState.sessions % 4 === 0 ? POMO.longBreak : POMO.shortBreak;
    pomoState.total = pomoState.remaining;
  } else {
    pomoState.phase = 'work';
    pomoState.remaining = POMO.work;
    pomoState.total = POMO.work;
  }
  pomoRender();
}

// 초기화
load();
render();
workLoad();
workRender();
pomoLoad();
pomoRender();
</script>
